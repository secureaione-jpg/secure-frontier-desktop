name: Release

# Build installers for macOS, Windows, and Linux and publish them to a GitHub
# Release. electron-builder is the sole publisher (it also writes the
# latest*.yml manifests that electron-updater reads). Triggers on a version
# tag (e.g. v0.1.4) or manual dispatch.
#
# Code signing is OPT-IN via repository secrets — see SIGNING.md. With no
# secrets set the build is unsigned (today's behavior); add the secrets and it
# signs + notarizes automatically with no workflow change.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # Only export signing vars when the secret is actually set. Exporting an
      # EMPTY CSC_LINK makes electron-builder think a cert was supplied and then
      # fail; absent secrets must stay fully unset so it builds unsigned.
      - name: Configure signing
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$MAC_CSC_LINK" ]; then
            {
              echo "CSC_LINK=$MAC_CSC_LINK"
              echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD"
              echo "CSC_IDENTITY_AUTO_DISCOVERY=true"
            } >> "$GITHUB_ENV"
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi
          if [ -n "$WIN_CSC_LINK" ]; then
            {
              echo "WIN_CSC_LINK=$WIN_CSC_LINK"
              echo "WIN_CSC_KEY_PASSWORD=$WIN_CSC_KEY_PASSWORD"
            } >> "$GITHUB_ENV"
          fi
          if [ -n "$APPLE_ID" ]; then
            {
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
          fi

      - name: Build & publish installers
        run: npm run dist -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
