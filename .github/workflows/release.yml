name: Release

# Build installers for macOS, Windows, and Linux and publish them to a GitHub
# Release. electron-builder is the sole publisher (it also writes the
# latest*.yml manifests that electron-updater reads). Triggers on a version
# tag (e.g. v0.1.2) or manual dispatch.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build & publish installers
        run: npm run dist -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No code-signing certs configured yet; build unsigned for now.
          CSC_IDENTITY_AUTO_DISCOVERY: false
